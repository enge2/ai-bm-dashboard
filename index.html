<html lang="ja">
<head>
<meta charset="UTF-8"/>

<title>AI月5万円 戦略BM｜李</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
/* ── DESIGN TOKENS ───────────────────────────────────────── */
:root {
  --bg:        #f1f5f9;
  --surface:   #ffffff;
  --surface2:  #f8fafc;
  --border:    #e2e8f0;
  --border2:   #cbd5e1;
  --ink:       #0f172a;
  --ink2:      #475569;
  --ink3:      #94a3b8;
  --accent:    #6366f1;
  --accent-s:  #eef2ff;
  --accent-m:  #818cf8;
  --green:     #10b981;
  --green-s:   #ecfdf5;
  --amber:     #f59e0b;
  --amber-s:   #fffbeb;
  --red:       #ef4444;
  --red-s:     #fef2f2;
  --r:         10px;
  --r-sm:      6px;
  --sh:        0 1px 3px rgba(15,23,42,.06),0 4px 16px rgba(15,23,42,.05);
  --sidebar-w: 256px;
  --hdr-h:     56px;
  --font-en:   'Inter', system-ui, sans-serif;
  --font-jp:   'Noto Sans JP', 'Hiragino Sans', system-ui, sans-serif;
}

/* ── RESET ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-jp);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  min-height: 100vh;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
select { font-family: inherit; }
ul, ol { list-style: none; }
a { color: inherit; text-decoration: none; }

/* ── SCROLLBAR ───────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── LAYOUT ──────────────────────────────────────────────── */
.l-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--hdr-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px;
  box-shadow: 0 1px 0 var(--border);
}
.l-body {
  display: flex;
  padding-top: var(--hdr-h);
  min-height: 100vh;
}
.l-sidebar {
  position: fixed;
  top: var(--hdr-h); left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  z-index: 90;
  transition: transform .25s ease;
}
.l-main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: calc(100vh - var(--hdr-h));
  display: flex; flex-direction: column;
}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr-logo {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-en); font-weight: 800; font-size: 16px; color: #fff;
  flex-shrink: 0;
}
.hdr-title {
  font-family: var(--font-en); font-weight: 700; font-size: 14px;
  color: var(--ink); letter-spacing: -.02em;
}
.hdr-sub {
  font-size: 12px; color: var(--ink3); font-weight: 400;
  display: none;
}
.hdr-spacer { flex: 1; }
.hdr-chips { display: flex; gap: 6px; }
.hdr-chip {
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: .01em;
  border: 1px solid;
}
.chip-pct { background: var(--accent-s); color: var(--accent); border-color: #c7d2fe; }
.chip-act { background: var(--green-s);  color: #059669;        border-color: #a7f3d0; }
.chip-td  { background: var(--amber-s);  color: #b45309;        border-color: #fde68a; }
.hdr-menu-btn {
  display: none; width: 36px; height: 36px; border-radius: 8px;
  align-items: center; justify-content: center;
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 18px; color: var(--ink2);
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sb-scroll { flex: 1; overflow-y: auto; padding: 10px 8px; }
.sb-group-label {
  padding: 12px 8px 4px;
  font-size: 10px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink3);
}
.sb-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  cursor: pointer; margin-bottom: 2px;
  transition: background .12s;
  border: 1px solid transparent;
}
.sb-item:hover { background: var(--surface2); }
.sb-item.active {
  background: var(--accent-s);
  border-color: #c7d2fe;
}
.sb-badge {
  width: 28px; height: 28px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-en); font-weight: 800; font-size: 11px;
  flex-shrink: 0;
}
.sb-info { flex: 1; min-width: 0; }
.sb-name {
  font-size: 12px; font-weight: 600; color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  margin-bottom: 4px;
}
.sb-meta { display: flex; align-items: center; gap: 6px; }
.sb-status {
  font-size: 10px; font-weight: 600; padding: 1px 6px;
  border-radius: 4px; flex-shrink: 0;
}
.st-ns  { background: var(--surface2);  color: var(--ink3);  border: 1px solid var(--border); }
.st-ip  { background: var(--accent-s);  color: var(--accent); border: 1px solid #c7d2fe; }
.st-dn  { background: var(--green-s);   color: #059669;       border: 1px solid #a7f3d0; }
.sb-prog {
  flex: 1; height: 3px; background: var(--border);
  border-radius: 2px; overflow: hidden;
}
.sb-prog-fill {
  height: 100%; background: var(--accent);
  border-radius: 2px; transition: width .3s;
}
.sb-footer {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: grid; grid-template-columns: repeat(3,1fr); text-align: center;
}
.sb-footer-val { font-size: 15px; font-weight: 700; color: var(--accent); }
.sb-footer-lbl { font-size: 10px; color: var(--ink3); margin-top: 2px; }

/* ── EMPTY STATE ──────────────────────────────────────────── */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; padding: 40px; text-align: center;
}
.empty-icon {
  width: 72px; height: 72px; border-radius: 18px;
  background: var(--accent-s); border: 1px solid #c7d2fe;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-en); font-weight: 800; font-size: 28px;
  color: var(--accent);
}
.empty-state h2 { font-size: 17px; font-weight: 700; }
.empty-state p  { font-size: 13px; color: var(--ink2); }

/* ── BM VIEW ──────────────────────────────────────────────── */
.bm-view { display: none; flex-direction: column; flex: 1; }
.bm-view.visible { display: flex; }

.bm-hdr {
  padding: 18px 24px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.bm-hdr-top {
  display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px;
}
.bm-num {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-en); font-weight: 800; font-size: 13px;
  flex-shrink: 0;
}
.bm-title-block { flex: 1; }
.bm-title {
  font-size: 18px; font-weight: 700; color: var(--ink);
  line-height: 1.3; margin-bottom: 8px;
}
.bm-tags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.tag {
  padding: 3px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 600; border: 1px solid;
}
.urg-now   { background: var(--red-s);   color: #dc2626; border-color: #fca5a5; }
.urg-mid   { background: var(--amber-s); color: #b45309; border-color: #fde68a; }
.urg-build { background: var(--accent-s);color: var(--accent); border-color: #c7d2fe; }
.tag-type  { background: var(--surface2);color: var(--ink2); border-color: var(--border); }
.tag-dl    { font-size: 11px; font-weight: 600; }
.st-sel {
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--ink2); font-size: 11px; font-weight: 600;
  outline: none; cursor: pointer;
}
.bm-prog-row {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--ink2);
}
.bm-prog-bg {
  flex: 1; height: 5px; background: var(--border);
  border-radius: 3px; overflow: hidden;
}
.bm-prog-fill {
  height: 100%; background: var(--accent);
  border-radius: 3px; transition: width .4s;
}
.bm-prog-pct { font-weight: 700; color: var(--accent); min-width: 32px; text-align: right; }

/* ── TABS ──────────────────────────────────────────────────── */
.tabs-nav {
  display: flex; background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  overflow-x: auto; flex-shrink: 0;
}
.tabs-nav::-webkit-scrollbar { height: 0; }
.tab-btn {
  padding: 11px 14px; font-size: 13px; font-weight: 600;
  color: var(--ink2); border-bottom: 2px solid transparent;
  white-space: nowrap; transition: all .12s;
}
.tab-btn:hover { color: var(--ink); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.tabs-content { flex: 1; overflow-y: auto; }
.tab-panel { display: none; padding: 20px 24px; }
.tab-panel.active { display: block; }

/* ── CARDS ─────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--sh);
  padding: 16px 18px;
  margin-bottom: 12px;
}
.card-label {
  font-size: 10px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink3);
  margin-bottom: 8px;
}
.card-title {
  font-size: 14px; font-weight: 700; color: var(--ink);
  margin-bottom: 6px;
}
.card-body { font-size: 13px; color: var(--ink2); line-height: 1.75; }

/* ── OVERVIEW PANEL ────────────────────────────────────────── */
.overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

.desc-card {
  background: linear-gradient(135deg, var(--accent-s) 0%, #f0f4ff 100%);
  border: 1px solid #c7d2fe;
  border-left: 3px solid var(--accent);
  border-radius: var(--r);
  padding: 16px 18px; margin-bottom: 12px;
}
.how-card {
  background: linear-gradient(135deg, var(--green-s) 0%, #f0fdf8 100%);
  border: 1px solid #a7f3d0;
  border-left: 3px solid var(--green);
  border-radius: var(--r);
  padding: 16px 18px; margin-bottom: 12px;
}
.how-card ol { padding-left: 18px; list-style: decimal; }
.how-card li {
  font-size: 13px; color: var(--ink2); line-height: 1.7;
  margin-bottom: 4px;
}
.how-card li:last-child { margin-bottom: 0; }

.ue-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
.ue-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  box-shadow: var(--sh);
}
.ue-label { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--ink3); margin-bottom: 4px; }
.ue-val { font-size: 15px; font-weight: 700; }
.uv-green { color: var(--green); }
.uv-blue  { color: #3b82f6; }
.uv-amber { color: var(--amber); }
.uv-indigo{ color: var(--accent); }

/* ── TOOLS PANEL ───────────────────────────────────────────── */
.tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 10px; }
.tool-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 12px 14px;
  display: flex; gap: 10px; align-items: flex-start;
  box-shadow: var(--sh);
}
.tool-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.tool-name { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
.tool-use  { font-size: 11px; color: var(--ink2); line-height: 1.5; }

/* ── MILESTONES ────────────────────────────────────────────── */
.ms-list { }
.ms-item {
  display: flex; gap: 12px; padding: 10px 4px;
  cursor: pointer; border-bottom: 1px solid var(--border);
  transition: background .1s; border-radius: var(--r-sm);
}
.ms-item:last-child { border-bottom: none; }
.ms-item:hover { background: var(--surface2); }
.ms-spine { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; padding-top: 2px; }
.ms-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--border2); background: var(--surface);
  transition: all .2s; flex-shrink: 0;
}
.ms-dot.done { background: var(--green); border-color: var(--green); }
.ms-dot.active { background: var(--accent); border-color: var(--accent); }
.ms-line { width: 2px; flex: 1; background: var(--border); margin-top: 4px; min-height: 12px; }
.ms-content { flex: 1; }
.ms-day { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: .04em; margin-bottom: 2px; }
.ms-text { font-size: 13px; color: var(--ink2); line-height: 1.6; }
.ms-item.checked .ms-text { text-decoration: line-through; color: var(--ink3); }

/* ── TODOS ──────────────────────────────────────────────────── */
.td-count { font-size: 12px; color: var(--ink3); padding: 0 4px 10px; }
.td-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 6px; border-bottom: 1px solid var(--border);
  cursor: pointer; border-radius: var(--r-sm);
  transition: background .1s;
}
.td-item:last-child { border-bottom: none; }
.td-item:hover { background: var(--surface2); }
.td-check {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1.5px solid var(--border2); background: var(--surface);
  flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.td-item.checked .td-check { background: var(--green); border-color: var(--green); }
.td-item.checked .td-check::after { content: "✓"; font-size: 10px; color: #fff; font-weight: 900; }
.td-item.checked .td-text { text-decoration: line-through; color: var(--ink3); }
.td-text { font-size: 13px; color: var(--ink2); line-height: 1.65; }

/* ── STRATEGY RATIONALE ────────────────────────────────────── */
.rationale-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px; margin-bottom: 12px;
  box-shadow: var(--sh);
}

/* ── BM BADGE COLORS ────────────────────────────────────────── */
.bc1  { background: #ede9fe; color: #5b21b6; }
.bc2  { background: #e0f2fe; color: #0369a1; }
.bc3  { background: #fce7f3; color: #9d174d; }
.bc4  { background: #ffedd5; color: #9a3412; }
.bc5  { background: #dcfce7; color: #166534; }
.bc6  { background: #fef9c3; color: #854d0e; }
.bc7  { background: #ffe4e6; color: #9f1239; }
.bc8  { background: #f3e8ff; color: #6b21a8; }
.bc9  { background: #ccfbf1; color: #134e4a; }
.bc10 { background: #dbeafe; color: #1e40af; }

/* ── DRAWER (MOBILE) ────────────────────────────────────────── */
.drawer-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(15,23,42,.4); backdrop-filter: blur(2px);
}
.drawer-overlay.open { display: block; }
.l-drawer {
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 201;
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transform: translateX(-100%); transition: transform .25s ease;
  overflow: hidden;
}
.l-drawer.open { transform: translateX(0); }
.drawer-hdr {
  height: var(--hdr-h); padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.drawer-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--ink2);
}

/* ── MOBILE SELECT ──────────────────────────────────────────── */
.mobile-bm-select {
  display: none;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.mobile-bm-select select {
  width: 100%; padding: 8px 12px;
  border: 1px solid var(--border2); border-radius: 8px;
  background: var(--surface); color: var(--ink);
  font-size: 13px; font-weight: 600; outline: none;
}

/* ── MEDIA QUERIES ─────────────────────────────────────────── */
@media (max-width: 768px) {
  .l-sidebar { display: none; }
  .l-main { margin-left: 0; }
  .hdr-menu-btn { display: flex; }
  .hdr-chips .chip-act { display: none; }
  .hdr-sub { display: none; }
  .mobile-bm-select { display: block; }
  .bm-hdr { padding: 14px 16px 10px; }
  .bm-title { font-size: 16px; }
  .tab-panel { padding: 14px 16px; }
  .tabs-nav { padding: 0 16px; }
  .overview-grid { grid-template-columns: 1fr; }
  .ue-grid { grid-template-columns: 1fr 1fr; }
  .tools-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 480px) {
  .hdr-chips { gap: 4px; }
  .hdr-chip { padding: 3px 7px; font-size: 10px; }
  .bm-hdr-top { flex-direction: column; gap: 8px; }
  .bm-num { width: 32px; height: 32px; font-size: 11px; }
  .ue-grid { grid-template-columns: 1fr; }
  .tools-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="l-header">
  <button class="hdr-menu-btn" id="menu-btn">☰</button>
  <div class="hdr-logo">L</div>
  <div class="hdr-title">AI Value Arbitrage — 月5万円 戦略BM</div>
  <span class="hdr-sub">担当: 李 ／ AT Kearney水準 ／ Deadline: 2026-07-14</span>
  <div class="hdr-spacer"></div>
  <div class="hdr-chips">
    <span class="hdr-chip chip-pct" id="h-pct">0% 完了</span>
    <span class="hdr-chip chip-act" id="h-act">0件 進行中</span>
    <span class="hdr-chip chip-td"  id="h-td">0/0 ToDo</span>
  </div>
</header>

<!-- MOBILE DRAWER -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<aside class="l-drawer" id="drawer">
  <div class="drawer-hdr">
    <div style="font-size:13px;font-weight:700;">BM一覧</div>
    <button class="drawer-close" id="drawer-close">✕</button>
  </div>
  <div class="sb-scroll" id="drawer-list"></div>
  <div class="sb-footer">
    <div><div class="sb-footer-val" id="d-dn">0</div><div class="sb-footer-lbl">完了TD</div></div>
    <div><div class="sb-footer-val" id="d-tot">0</div><div class="sb-footer-lbl">総TD</div></div>
    <div><div class="sb-footer-val" id="d-pct">0%</div><div class="sb-footer-lbl">進捗</div></div>
  </div>
</aside>

<!-- BODY -->
<div class="l-body">

  <!-- SIDEBAR -->
  <aside class="l-sidebar">
    <div class="sb-scroll" id="sb-list"></div>
    <div class="sb-footer">
      <div><div class="sb-footer-val" id="sf-dn">0</div><div class="sb-footer-lbl">完了TD</div></div>
      <div><div class="sb-footer-val" id="sf-tot">0</div><div class="sb-footer-lbl">総TD</div></div>
      <div><div class="sb-footer-val" id="sf-pct">0%</div><div class="sb-footer-lbl">進捗</div></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="l-main">

    <!-- MOBILE BM SELECTOR -->

/* ── STATE ────────────────────────────────────────────────── */
const KEY = "bm_v5";
let S = JSON.parse(localStorage.getItem(KEY) || "{}");
let CUR = null, CTAB = "overview";

const BC = ["bc1","bc2","bc3","bc4","bc5","bc6","bc7","bc8","bc9","bc10"];
const BN = ["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩"];
const ST = {notstarted:"未着手", inprogress:"進行中", done:"完了"};
const STC = {notstarted:"st-ns", inprogress:"st-ip", done:"st-dn"};
const UL = {now:"🔥 即着手", mid:"⚡ 中期", build:"🏗 構築型"};
const UC = {now:"urg-now", mid:"urg-mid", build:"urg-build"};

function gs(id) {
  if (!S[id]) S[id] = {st:"notstarted", td:[], ms:[]};
  return S[id];
}
function save() { localStorage.setItem(KEY, JSON.stringify(S)); }
function dl(d) { return Math.ceil((new Date(d) - Date.now()) / 86400000); }

/* ── KPI ──────────────────────────────────────────────────── */
function updateKPI() {
  let dn=0, tot=0, act=0;
  BMS.forEach(b => {
    const s = gs(b.id);
    dn  += s.td.length;
    tot += b.todos.length;
    if (s.st === "inprogress") act++;
  });
  const p = tot ? Math.round(dn / tot * 100) : 0;
  ["h-pct","sf-pct","d-pct"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = p + "%";
    if (id === "h-pct" && el) el.textContent = p + "% 完了";
  });
  const hact = document.getElementById("h-act");
  if (hact) hact.textContent = act + "件 進行中";
  const htd = document.getElementById("h-td");
  if (htd) htd.textContent = dn + "/" + tot + " ToDo";
  ["sf-dn","d-dn"].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = dn; });
  ["sf-tot","d-tot"].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = tot; });
}

/* ── SIDEBAR ──────────────────────────────────────────────── */
function renderSidebarHTML(targetId) {
  const groups = [
    {label:"🔥 即着手型 (TTR 7〜14日)", ids:[1,2,3,4]},
    {label:"⚡ 中期着手型 (TTR 14〜21日)", ids:[5,6,7,9]},
    {label:"🏗 構築・高単価型", ids:[8,10]}
  ];
  let h = "";
  groups.forEach(g => {
    h += `<div class="sb-group-label">${g.label}</div>`;
    g.ids.forEach(id => {
      const b = BMS.find(x => x.id === id), s = gs(id);
      const p = b.todos.length ? Math.round(s.td.length / b.todos.length * 100) : 0;
      h += `<div class="sb-item${CUR === id ? " active" : ""}" onclick="selBM(${id}); closeDrawer();">
        <div class="sb-badge ${BC[id-1]}">${BN[id-1]}</div>
        <div class="sb-info">
          <div class="sb-name">${b.title}</div>
          <div class="sb-meta">
            <span class="sb-status ${STC[s.st]}">${ST[s.st]}</span>
            <div class="sb-prog"><div class="sb-prog-fill" style="width:${p}%"></div></div>
          </div>
        </div>
      </div>`;
    });
  });
  document.getElementById(targetId).innerHTML = h;
}

function renderSidebar() {
  renderSidebarHTML("sb-list");
  renderSidebarHTML("drawer-list");
  updateKPI();
}

/* ── SELECT BM ────────────────────────────────────────────── */
function selBM(id) {
  if (!id) return;
  CUR = id; CTAB = "overview";
  document.getElementById("empty").style.display = "none";
  const v = document.getElementById("bm-view");
  v.classList.add("visible");
  // Sync mobile select
  const ms = document.getElementById("mobile-sel");
  if (ms) ms.value = id;
  renderBM();
  renderSidebar();
}

/* ── RENDER BM ────────────────────────────────────────────── */
function renderBM() {
  if (!CUR) return;
  const b = BMS.find(x => x.id === CUR), s = gs(CUR);
  const p = b.todos.length ? Math.round(s.td.length / b.todos.length * 100) : 0;
  const d = dl(b.dl);
  const dc = d < 0 ? "color:#ef4444" : d < 14 ? "color:#f59e0b" : "color:#10b981";

  // Header
  document.getElementById("bm-hdr").innerHTML = `
    <div class="bm-hdr-top">
      <div class="bm-num ${BC[CUR-1]}">BM${BN[CUR-1]}</div>
      <div class="bm-title-block">
        <div class="bm-title">${b.title}</div>
        <div class="bm-tags">
          <span class="tag ${UC[b.urgency]}">${UL[b.urgency]}</span>
          <span class="tag tag-type">${b.type}</span>
          <select class="st-sel" onchange="chSt(this.value)">
            <option value="notstarted"${s.st==="notstarted"?" selected":""}>未着手</option>
            <option value="inprogress"${s.st==="inprogress"?" selected":""}>進行中</option>
            <option value="done"${s.st==="done"?" selected":""}>完了</option>
          </select>
          <span class="tag tag-dl" style="${dc}">📅 ${b.dl}（${d<0?"超過":d+"日後"}）</span>
        </div>
      </div>
    </div>
    <div class="bm-prog-row">
      <span>ToDo ${s.td.length}/${b.todos.length}</span>
      <div class="bm-prog-bg"><div class="bm-prog-fill" style="width:${p}%"></div></div>
      <span class="bm-prog-pct">${p}%</span>
    </div>`;

  // Overview panel
  document.getElementById("panel-overview").innerHTML = `
    <div class="desc-card">
      <div class="card-label">このサービスとは？</div>
      <div class="card-body">${b.desc}</div>
    </div>
    <div class="how-card">
      <div class="card-label">💰 マネタイズの仕組み・稼ぎ方</div>
      <ol>${b.how.map(h => `<li>${h}</li>`).join("")}</ol>
    </div>
    <div class="card-label" style="margin-bottom:8px;">ユニットエコノミクス</div>
    <div class="ue-grid">${b.ue.map(u => `
      <div class="ue-card">
        <div class="ue-label">${u.l}</div>
        <div class="ue-val ${u.c}">${u.v}</div>
      </div>`).join("")}
    </div>`;

  // Strategy panel
  document.getElementById("panel-strategy").innerHTML = `
    <div class="rationale-card">
      <div class="card-label">AT Kearney 戦略的根拠 — AI Value Arbitrage</div>
      <div class="card-body" style="margin-top:8px;">${b.rationale}</div>
    </div>`;

  // Tools panel
  document.getElementById("panel-tools").innerHTML = `
    <div class="card-label" style="margin-bottom:12px;">使用ツール・技術スタック</div>
    <div class="tools-grid">${b.tools.map(t => `
      <div class="tool-card">
        <div class="tool-icon">${t.i}</div>
        <div>
          <div class="tool-name">${t.n}</div>
          <div class="tool-use">${t.u}</div>
        </div>
      </div>`).join("")}
    </div>`;

  // Milestones panel
  document.getElementById("panel-milestones").innerHTML = `<ul class="ms-list">${
    b.ms.map((m, i) => {
      const done = s.ms.includes(i);
      const isAc = !done && i === s.ms.length;
      const dm = m.match(/^(Day[\d\-]+[^:]*): /);
      const day = dm ? dm[1] : "";
      const txt = dm ? m.slice(dm[0].length) : m;
      return `<li class="ms-item${done?" checked":""}" onclick="togMs(${i})">
        <div class="ms-spine">
          <div class="ms-dot${done?" done":isAc?" active":""}"></div>
          ${i < b.ms.length-1 ? '<div class="ms-line"></div>' : ""}
        </div>
        <div class="ms-content">
          ${day ? `<div class="ms-day">${day}</div>` : ""}
          <div class="ms-text">${txt}</div>
        </div>
      </li>`;
    }).join("")
  }</ul>`;

  // ToDo panel
  document.getElementById("panel-todos").innerHTML = `
    <div class="td-count">${s.td.length} / ${b.todos.length} 完了</div>
    <ul>${b.todos.map((t,i) => `
      <li class="td-item${s.td.includes(i)?" checked":""}" onclick="togTd(${i})">
        <div class="td-check"></div>
        <span class="td-text">${t}</span>
      </li>`).join("")}
    </ul>`;

  setTab(CTAB);
}

/* ── INTERACTIONS ────────────────────────────────────────── */
function setTab(t) {
  CTAB = t;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === t));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + t));
}
function chSt(v)   { gs(CUR).st = v; save(); renderBM(); renderSidebar(); }
function togMs(i)  { const s = gs(CUR); s.ms.includes(i) ? s.ms = s.ms.filter(x=>x!==i) : s.ms.push(i); save(); renderBM(); }
function togTd(i)  { const s = gs(CUR); s.td.includes(i) ? s.td = s.td.filter(x=>x!==i) : s.td.push(i); save(); renderBM(); renderSidebar(); }

/* ── DRAWER ───────────────────────────────────────────────── */
function openDrawer()  {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawer-overlay").classList.add("open");
}
function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawer-overlay").classList.remove("open");
}

/* ── INIT ─────────────────────────────────────────────────── */
document.addEventListener("DOMContentLoaded", () => {
  // Populate mobile select
  const ms = document.getElementById("mobile-sel");
  BMS.forEach(b => {
    const o = document.createElement("option");
    o.value = b.id;
    o.textContent = `BM${BN[b.id-1]} ${b.title}`;
    ms.appendChild(o);
  });

  renderSidebar();

  document.getElementById("tabs-nav").addEventListener("click", e => {
    const t = e.target.closest(".tab-btn");
    if (t) setTab(t.dataset.tab);
  });
  document.getElementById("menu-btn").addEventListener("click", openDrawer);
  document.getElementById("drawer-close").addEventListener("click", closeDrawer);
  document.getElementById("drawer-overlay").addEventListener("click", closeDrawer);
});
</script>
</body>
