const KEY="atk_v4";
let S=JSON.parse(localStorage.getItem(KEY)||"{}"),CUR=null,CTAB="strategy";
const nc=["n1","n2","n3","n4","n5","n6","n7","n8","n9","n10"];
const stn={notstarted:"未着手",inprogress:"進行中",done:"完了"};
const stc={notstarted:"t-ns",inprogress:"t-ip",done:"t-dn"};
const uL={now:"🔥 即着手",mid:"⚡ 中期",build:"🏗 構築型"};
const uC={now:"u-now",mid:"u-mid",build:"u-build"};
const bN=["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩"];
function gs(id){if(!S[id])S[id]={st:"notstarted",td:[],ms:[]};return S[id];}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
function dl(d){return Math.ceil((new Date(d)-Date.now())/86400000);}

function kpi(){
  let dn=0,tot=0,act=0;
  BMS.forEach(b=>{const s=gs(b.id);dn+=s.td.length;tot+=b.todos.length;if(s.st==="inprogress")act++;});
  const p=tot?Math.round(dn/tot*100):0;
  document.getElementById("h-pct").textContent=p+"% 完了";
  document.getElementById("h-act").textContent=act+"件 進行中";
  document.getElementById("h-td").textContent=dn+"/"+tot+" ToDo";
  document.getElementById("sf-dn").textContent=dn;
  document.getElementById("sf-tot").textContent=tot;
  document.getElementById("sf-pct").textContent=p+"%";
}

function renderSidebar(){
  const groups=[
    {label:"🔥 即着手型（TTR 7〜14日）",ids:[1,2,3,4]},
    {label:"⚡ 中期着手型（TTR 14〜21日）",ids:[5,6,7,9]},
    {label:"🏗 構築・高単価型",ids:[8,10]}
  ];
  let h="";
  groups.forEach(g=>{
    h+=`<div class="sg-label">${g.label}</div>`;
    g.ids.forEach(id=>{
      const b=BMS.find(x=>x.id===id),s=gs(id);
      const p=b.todos.length?Math.round(s.td.length/b.todos.length*100):0;
      h+=`<div class="bm-item${CUR===id?" active":""}" onclick="selBM(${id})">
        <div class="bm-badge ${nc[id-1]}">${bN[id-1]}</div>
        <div class="bm-info">
          <div class="bm-name">${b.title}</div>
          <div class="bm-row2"><span class="bm-stag tag ${stc[s.st]}">${stn[s.st]}</span><div class="mini-bar"><div class="mini-fill" style="width:${p}%"></div></div></div>
        </div>
      </div>`;
    });
  });
  document.getElementById("sb-list").innerHTML=h;
  kpi();
}

function selBM(id){
  CUR=id;CTAB="strategy";
  document.getElementById("empty").style.display="none";
  const v=document.getElementById("bm-view");v.style.display="flex";
  renderBM();renderSidebar();
}

function renderBM(){
  if(!CUR)return;
  const b=BMS.find(x=>x.id===CUR),s=gs(CUR);
  const p=b.todos.length?Math.round(s.td.length/b.todos.length*100):0;
  const d=dl(b.dl),dc=d<0?"color:#ef4444":d<14?"color:#f59e0b":"color:#10b981";
  // Header
  document.getElementById("bm-hd").innerHTML=`
    <div class="bm-hd-top">
      <div class="bm-num-xl ${nc[CUR-1]}">BM${bN[CUR-1]}</div>
      <div class="bm-title-blk">
        <div class="bm-main-ttl">${b.title}</div>
        <div class="bm-tags">
          <span class="tag ${uC[b.urgency]}">${uL[b.urgency]}</span>
          <span class="tag t-type">${b.type}</span>
          <select class="stsel" onchange="chSt(this.value)">
            <option value="notstarted"${s.st==="notstarted"?" selected":""}>未着手</option>
            <option value="inprogress"${s.st==="inprogress"?" selected":""}>進行中</option>
            <option value="done"${s.st==="done"?" selected":""}>完了</option>
          </select>
          <span class="dl-txt" style="${dc}">期限: ${b.dl}（${d<0?"超過":d+"日後"}）</span>
        </div>
      </div>
    </div>
    <div class="bm-prog-row">
      <span>ToDo ${s.td.length}/${b.todos.length}</span>
      <div class="bm-prog-bg"><div class="bm-prog-fill" style="width:${p}%"></div></div>
      <span style="font-weight:700;color:#a78bfa">${p}%</span>
    </div>`;
  // Strategy panel
  document.getElementById("panel-strategy").innerHTML=`
    <div class="rat-box"><div class="box-lbl">戦略的根拠 — AI Value Arbitrage</div><div class="box-txt">${b.rationale}</div></div>
    <div class="box-lbl" style="margin-bottom:8px;">ユニットエコノミクス</div>
    <div class="ue-grid">${b.ue.map(u=>`<div class="ue-card"><div class="ue-lbl">${u.l}</div><div class="ue-val ${u.c}">${u.v}</div></div>`).join("")}</div>`;
  // Tools panel
  document.getElementById("panel-tools").innerHTML=`
    <div class="box-lbl" style="margin-bottom:10px;">使用ツール・技術スタック</div>
    <div class="tools-grid">${b.tools.map(t=>`<div class="tool-card"><div class="tool-ico">${t.i}</div><div><div class="tool-name">${t.n}</div><div class="tool-use">${t.u}</div></div></div>`).join("")}</div>`;
  // Milestones panel
  document.getElementById("panel-milestones").innerHTML=`<ul class="ms-list">${
    b.ms.map((m,i)=>{
      const done=s.ms.includes(i),isAc=!done&&i===s.ms.length;
      const dm=m.match(/^(Day[\d\-]+):\s*/),day=dm?dm[1]:"",txt=dm?m.slice(dm[0].length):m;
      return`<li class="ms-item${done?" ck":""}" onclick="togMs(${i})">
        <div class="ms-spine"><div class="ms-dot${done?" dn":isAc?" ac":""}"></div>${i<b.ms.length-1?'<div class="ms-line"></div>':""}</div>
        <div class="ms-content">${day?`<div class="ms-day">${day}</div>`:""}
          <div class="ms-txt">${txt}</div></div>
      </li>`;
    }).join("")
  }</ul>`;
  // ToDo panel
  document.getElementById("panel-todos").innerHTML=`
    <div class="td-count">${s.td.length} / ${b.todos.length} 完了</div>
    <ul class="td-list">${
      b.todos.map((t,i)=>`<li class="td-item${s.td.includes(i)?" ck":""}" onclick="togTd(${i})"><div class="td-cb"></div><span class="td-txt">${t}</span></li>`).join("")
    }</ul>`;
  setTab(CTAB);
}

function setTab(t){
  CTAB=t;
  document.querySelectorAll(".itab").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active",p.id==="panel-"+t));
}
function chSt(v){gs(CUR).st=v;save();renderBM();renderSidebar();}
function togMs(i){const s=gs(CUR);s.ms.includes(i)?s.ms=s.ms.filter(x=>x!==i):s.ms.push(i);save();renderBM();}
function togTd(i){const s=gs(CUR);s.td.includes(i)?s.td=s.td.filter(x=>x!==i):s.td.push(i);save();renderBM();renderSidebar();}

document.addEventListener("DOMContentLoaded",()=>{
  renderSidebar();
  document.getElementById("inner-tabs").addEventListener("click",e=>{
    const t=e.target.closest(".itab");if(t)setTab(t.dataset.tab);
  });
});
</script>
</body>
</html>
